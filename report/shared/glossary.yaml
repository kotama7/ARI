# report/shared/glossary.yaml
# Master en/ja/zh terminology table for the system report.
# Gate 7 (glossary fixation) enforces these translations.
# `forbidden_alternatives` lists known wrong / inconsistent renderings that
# must NOT appear in the body text.
#
# When adding/changing entries:
#   1. update version + bump `version`
#   2. invalidate the translation cache by running `scripts/translate.py --bump-glossary`
#   3. re-run `make translate-changed`
