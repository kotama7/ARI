# shared/code_refs.yaml
# Implementation file:line citations referenced by the report body.
# Gate 2 (code citation validity) reads this file via scripts/check_code_refs.py
# and verifies (a) each entry's path exists, (b) line numbers fall within bounds.
#
# Schema:
#   <slug>:
#     path:    repo-relative file path
#     anchor:  short symbol name (function/class/identifier) the line should contain
#     line:    integer (1-based)
#     used_in: list of report-side anchors (chapter file or section label)
#
# Adding/changing entries:
#   1. add the row here
#   2. cite in the body as e.g.  \cite[file=node\_selection.py,line=80]{code:node_selection.filter}
#   3. run `make check-code-refs`

