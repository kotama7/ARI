# Seeded 2026-07-01 from docs/refactoring/003_dependency_boundary_report.md
# §3/§16. The 7 B1 edges are ADAPTed by the B1 runtime subtasks (010/041); the
# ari_skill_memory core->skill edge is the sanctioned B2 exception (config-
# allowed, so it is never a finding -- documented here for completeness).

