# Frozen allowlist / baseline for scripts/check_import_boundaries.py
#
# Each entry is keyed by the stable identity "<repo-relative file>::<imported
# module>" (occurrences on multiple lines of the same file share one id).
# Findings on an allowlisted id are reported as `known` (not `new`) and never
# fail `--fail-on-regression`, so historical debt stays out of CI while NEW debt
# is blocked. Shrink this list by editing YAML as each edge is repointed at
# ari.public.* -- never by editing the checker (subtask 026 §17).
