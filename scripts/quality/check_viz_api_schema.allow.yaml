# Every id below is a `<METHOD> <canonical-path>` identity that the checker
# reports today against the real tree. Allowlisted findings are reported as
# `known` and never trip --fail-on-regression, keeping the historical baseline
# out of a future ratchet (009 plan §6, warning-mode-first). This file freezes
# the state proven in sync at authoring time (viz_api_contract_inventory.md /
# 020 + dashboard_fe_api_contract_inventory.md / 060, verified 2026-07-01).
