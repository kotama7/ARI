id: apsr
version: "2026"
venue: American Political Science Review (APSR) / AJPS / JOP
domain: Political Science

params:
  num_reflections: 5
  num_fs_examples: 0
  num_reviews_ensemble: 1
  temperature: 0.7
  score_threshold_decision: 4
  fewshot_mode: static
  fewshot_dir: ""

score_dimensions:
  - name: theoretical_contribution
    scale: [1, 5]
    description: >-
      Strength of the theoretical argument and its contribution to
      political science scholarship. 5=substantial, 1=weak or absent.
  - name: research_design
    scale: [1, 5]
    description: >-
      Quality of the research design — for empirical work, identification
      and measurement; for formal work, model specification and
      assumptions; for qualitative work, case selection and methods.
  - name: evidence_quality
    scale: [1, 5]
    description: >-
      Quality and appropriateness of the evidence (quantitative,
      qualitative, or formal) used to support the claims.
  - name: generalizability
    scale: [1, 5]
    description: >-
      Scope of the conclusions — how far the findings travel beyond the
      specific case, country, or period studied.
  - name: significance
    scale: [1, 5]
    description: Importance of the contribution to the discipline.
  - name: transparency_reproducibility
    scale: [1, 5]
    description: >-
      Adherence to DA-RT / APSA transparency norms (data, code,
      pre-registration, or qualitative-source transparency).
  - name: exposition
    scale: [1, 5]
    description: Writing quality and organisation.
  - name: overall
    scale: [1, 5]
    description: Overall recommendation.
  - name: confidence
    scale: [1, 5]
    description: Reviewer confidence.

text_sections:
  - { name: paper_summary, required: true }
  - { name: strengths, required: true }
  - { name: weaknesses, required: true }
  - { name: theory_assessment, required: true }
  - { name: design_and_evidence_assessment, required: true }
  - { name: required_revisions, required: true }
  - { name: suggested_revisions, required: false }
  - { name: questions_for_authors, required: false }

decision:
  type: categorical
  options: [accept, minor_revision, major_revision, reject_and_resubmit, reject]
  threshold_dimension: overall
  threshold_value: 4

prompt_overrides:
  system_hint: >-
    Follow APSR / AJPS / JOP reviewer norms. Evaluate theoretical
    contribution and research design as independent dimensions — a
    paper can have a strong design with thin theory, or vice versa, and
    both should be flagged. Apply DA-RT / APSA transparency norms when
    judging transparency_reproducibility, accommodating qualitative
    work via source transparency rather than code release. Be explicit
    about the scope conditions under which the claims hold.
  author_hint: >-
    Write for an APSR audience: foreground the theoretical contribution
    early, justify the research design and case / sample selection
    explicitly, and discuss scope conditions and external validity.
    Follow DA-RT / APSA transparency norms when describing data,
    sources, and analytic procedures.
