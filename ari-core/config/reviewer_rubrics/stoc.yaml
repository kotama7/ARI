id: stoc
version: "2026"
venue: STOC / FOCS / SODA / ICALP
domain: Theoretical Computer Science
closed_review: true

params:
  num_reflections: 5
  num_fs_examples: 0
  num_reviews_ensemble: 1
  temperature: 0.5   # lower — theory reviews reward precision over creative interpretation
  score_threshold_decision: 3
  fewshot_mode: static
  fewshot_dir: ""

score_dimensions:
  - { name: mathematical_correctness, scale: [1, 5], description: Rigor and verifiability of proofs (no gaps, no hand-waving) }
  - { name: technical_depth,          scale: [1, 5], description: Sophistication of techniques and new machinery introduced }
  - { name: novelty,                  scale: [1, 5], description: Originality relative to known results and prior techniques }
  - { name: relevance,                scale: [1, 5], description: Importance of the problem to theoretical CS }
  - { name: exposition,               scale: [1, 5], description: Clarity of proofs, definitions, and intuition sections }
  - { name: overall,                  scale: [1, 5], description: Overall recommendation }
  - { name: confidence,               scale: [1, 5], description: Reviewer expertise in the sub-area }

text_sections:
  - { name: strengths, required: true }
  - { name: weaknesses, required: true }
  - { name: technical_verification, required: true }
  - { name: comparison_to_prior_work, required: true }
  - { name: questions_for_authors, required: false }

decision:
  type: categorical
  options: [strong_accept, accept, borderline, reject, strong_reject]
  threshold_dimension: overall
  threshold_value: 4

prompt_overrides:
  system_hint: >-
    Follow STOC/FOCS/SODA reviewer norms. Proof correctness is non-negotiable —
    flag gaps, missing cases, and informal steps. Novelty must be measured
    against the precise quantitative improvement (e.g., exponent, approximation
    ratio) over prior work. Do not reward presentation-only contributions when
    techniques are standard.
