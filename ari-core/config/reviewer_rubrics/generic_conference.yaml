id: generic_conference
version: "2026"
venue: Generic Conference
domain: Any

params:
  num_reflections: 3
  num_fs_examples: 0
  num_reviews_ensemble: 1
  temperature: 0.75
  score_threshold_decision: 6
  fewshot_mode: static
  fewshot_dir: ""

score_dimensions:
  - { name: technical_quality, scale: [1, 10], description: Technical correctness and depth }
  - { name: novelty,           scale: [1, 10], description: Originality }
  - { name: clarity,           scale: [1, 10], description: Writing quality }
  - { name: significance,      scale: [1, 10], description: Impact on field }
  - { name: overall,           scale: [1, 10], description: Overall recommendation }
  - { name: confidence,        scale: [1, 5],  description: Reviewer confidence }

text_sections:
  - { name: strengths, required: true }
  - { name: weaknesses, required: true }
  - { name: comments, required: false }

decision:
  type: binary
  options: [accept, reject]
  threshold_dimension: overall
  threshold_value: 6

prompt_overrides:
  system_hint: Generic academic reviewer rubric; customise as needed.
