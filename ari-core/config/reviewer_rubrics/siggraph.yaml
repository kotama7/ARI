id: siggraph
version: "2026"
venue: SIGGRAPH / SIGGRAPH Asia / Eurographics
domain: Computer Graphics
closed_review: true

params:
  num_reflections: 5
  num_fs_examples: 0
  num_reviews_ensemble: 1
  temperature: 0.75
  score_threshold_decision: 3
  fewshot_mode: static
  fewshot_dir: ""

score_dimensions:
  - { name: technical_contribution, scale: [1, 5], description: Novelty and depth of graphics/rendering/geometry contribution }
  - { name: visual_quality,         scale: [1, 5], description: Quality of renders, animations, and visual results }
  - { name: significance,           scale: [1, 5], description: Impact on graphics research and practice }
  - { name: comparison_to_prior,    scale: [1, 5], description: Rigor of comparison with prior methods (identical scenes, parameters, fair renders) }
  - { name: reproducibility,        scale: [1, 5], description: Availability of scenes, code, and rendering parameters }
  - { name: writing_quality,        scale: [1, 5], description: Clarity and quality of writing and figures }
  - { name: overall,                scale: [1, 5], description: Overall recommendation }
  - { name: confidence,             scale: [1, 5], description: Reviewer expertise confidence }

text_sections:
  - { name: strengths, required: true }
  - { name: weaknesses, required: true }
  - { name: detailed_comments, required: true }
  - { name: video_supplement_notes, required: false }

decision:
  type: categorical
  options: [accept, conditional_accept, borderline, reject]
  threshold_dimension: overall
  threshold_value: 3

prompt_overrides:
  system_hint: >-
    Follow SIGGRAPH / SIGGRAPH Asia / Eurographics reviewer norms. Visual
    quality and supplementary video are evidence, not decoration — evaluate
    them critically. Flag unfair comparisons (different scenes, cherry-picked
    camera angles, mismatched rendering budgets). Reproducibility via shared
    scenes and parameters is a first-class dimension.
