id: iclr
version: "2026"
venue: ICLR
domain: ML / AI

params:
  num_reflections: 5
  num_fs_examples: 1
  num_reviews_ensemble: 1
  temperature: 0.75
  score_threshold_decision: 6
  fewshot_mode: static
  fewshot_dir: fewshot_examples/neurips  # shared with NeurIPS

score_dimensions:
  - name: soundness
    scale: [1, 4]
    description: >-
      Technical soundness. 4=excellent, 3=good, 2=fair, 1=poor.
  - name: presentation
    scale: [1, 4]
    description: >-
      Presentation quality. 4=excellent, 3=good, 2=fair, 1=poor.
  - name: contribution
    scale: [1, 4]
    description: >-
      Contribution significance. 4=excellent, 3=good, 2=fair, 1=poor.
  - name: ethical_concerns
    scale: [0, 1]
    description: >-
      Ethics review flag (0 = no concerns, 1 = flag for ethics review).
      ICLR 2024+ reviewer form includes an explicit ethics-flag field.
  - name: overall
    scale: [1, 10]
    description: >-
      Overall rating. 10=Strong accept (top 1%), 8=Accept (top 15%),
      6=Marginally above threshold, 5=Marginally below, 3=Reject,
      1=Strong reject (trivially flawed).
  - name: confidence
    scale: [1, 5]
    description: >-
      Reviewer confidence. 5=absolutely certain, 1=educated guess.

text_sections:
  - { name: summary, required: true }   # ICLR form requires "Summary Of The Paper"
  - { name: strengths, required: true }
  - { name: weaknesses, required: true }
  - { name: questions, required: true }
  - { name: limitations, required: false }

decision:
  type: binary
  options: [accept, reject]
  threshold_dimension: overall
  threshold_value: 6

prompt_overrides:
  system_hint: >-
    Follow the ICLR 2026 reviewer guidelines (double-blind, OpenReview).
    Begin with a faithful paper summary (summary field) before strengths
    and weaknesses — reviewers must demonstrate understanding of the
    contribution. Set ethical_concerns=1 only when the submission requires
    an ethics review (human subjects without consent, dual-use risk, etc.).
