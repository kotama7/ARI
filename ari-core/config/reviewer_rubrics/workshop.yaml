id: workshop
version: "2026"
venue: Workshop / Short Paper (generic)
domain: Any
closed_review: true

params:
  num_reflections: 3       # shorter papers deserve a lighter review loop
  num_fs_examples: 0
  num_reviews_ensemble: 1
  temperature: 0.75
  score_threshold_decision: 3
  fewshot_mode: static
  fewshot_dir: ""

score_dimensions:
  - { name: relevance_to_workshop, scale: [1, 5], description: Fit with workshop scope, theme, and audience }
  - { name: technical_quality,     scale: [1, 5], description: Correctness and depth (calibrated for short-paper format) }
  - { name: novelty,               scale: [1, 5], description: Originality relative to prior work (early-stage ideas acceptable) }
  - { name: clarity,               scale: [1, 5], description: Writing quality for a short paper }
  - { name: discussion_potential,  scale: [1, 5], description: How likely the paper is to spark productive discussion at the workshop }
  - { name: overall,               scale: [1, 5], description: Overall recommendation }
  - { name: confidence,            scale: [1, 5], description: Reviewer confidence }

text_sections:
  - { name: strengths, required: true }
  - { name: weaknesses, required: true }
  - { name: comments_for_authors, required: false }

decision:
  type: categorical
  options: [accept_oral, accept_poster, reject]
  threshold_dimension: overall
  threshold_value: 3

prompt_overrides:
  system_hint: >-
    Workshop / short-paper review — be generous to early-stage ideas and
    position papers, but strict on relevance to the workshop's stated scope.
    Technical depth should be calibrated to page limits (do not demand
    full-paper-level evaluation). Prefer accept_poster for promising but
    incomplete ideas over outright reject.
