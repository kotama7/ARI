id: sc
version: "2026"
venue: ACM/IEEE Supercomputing (SC)
domain: HPC / Systems
closed_review: true

params:
  num_reflections: 5
  num_fs_examples: 0  # SC reviews are closed; no public fewshot available
  num_reviews_ensemble: 1
  temperature: 0.75
  score_threshold_decision: 3
  fewshot_mode: static   # dynamic unsupported (closed reviews)
  fewshot_dir: ""

score_dimensions:
  - name: novelty
    scale: [1, 5]
    description: >-
      Originality / novelty of the contribution relative to prior HPC work.
  - name: potential_impact
    scale: [1, 5]
    description: >-
      Potential impact on HPC practice and the supercomputing community.
  - name: technical_correctness
    scale: [1, 5]
    description: >-
      Soundness and correctness of the technical approach.
  - name: experimental_methodology
    scale: [1, 5]
    description: >-
      Benchmark selection, evaluation rigor, and methodological choices.
  - name: scalability_evaluation
    scale: [1, 5]
    description: >-
      Rigor of scaling study (strong vs. weak scaling, large-scale runs) —
      a first-class dimension at SC, distinct from general experimental
      methodology.
  - name: reproducibility
    scale: [1, 5]
    description: >-
      SC Artifact Description / Artifact Evaluation (AD/AE). Availability of
      code, data, build scripts, and machine configuration.
  - name: writing_quality
    scale: [1, 5]
    description: >-
      Clarity and organisation of the paper.
  - name: overall
    scale: [1, 5]
    description: >-
      Overall recommendation. 5=strong accept, 4=accept, 3=borderline,
      2=weak reject, 1=reject.
  - name: confidence
    scale: [1, 5]
    description: >-
      Reviewer confidence (domain expertise).

text_sections:
  - { name: summary, required: true }
  - { name: strengths, required: true }
  - { name: weaknesses, required: true }
  - { name: detailed_comments, required: true }
  - { name: reproducibility_notes, required: false }

decision:
  type: categorical
  options: [accept, weak_accept, borderline, weak_reject, reject]
  threshold_dimension: overall
  threshold_value: 3

prompt_overrides:
  system_hint: >-
    Follow ACM/IEEE SC Technical Papers reviewer criteria. SC demands a
    proper scaling study (strong/weak scaling at scale) and artifact
    description/evaluation (AD/AE) — these are first-class dimensions
    distinct from general experimental methodology. Reject simulation-only
    or toy-scale evaluations when real-HPC deployment is feasible.
    Dynamic few-shot retrieval is unsupported because SC reviews are not
    publicly available.
  # author_hint is the inverse of system_hint: it tells the drafting LLM
  # what an SC reviewer will look for, so the paper is written to make
  # those signals easy to surface. Injected by ari-skill-paper's
  # generate_section as a venue-conditioning block.
  author_hint: >-
    You are drafting an SC Technical Paper. SC reviewers grade scaling
    behaviour (strong AND weak scaling at scale) and Artifact
    Description/Evaluation (AD/AE) as first-class axes — these MUST
    each have a dedicated subsection or paragraph that names the
    metric, the nodes/ranks/GPUs swept, the result, and a sentence
    interpreting the curve. Do NOT bury scaling claims inside the
    method section. State the testbed (cluster name, node type,
    interconnect, compiler/MPI versions) explicitly enough that
    another lab could match the hardware. When reporting speedups or
    throughputs, give the absolute baseline number in the same
    sentence; reviewers will reject the claim if the baseline isn't
    visible. Be cautious with simulation-only or single-node studies
    — SC expects real-HPC deployment unless explicitly justified.
