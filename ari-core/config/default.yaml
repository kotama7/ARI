bfts:
  max_depth: 5
  max_parallel_nodes: 4
  max_retries_per_node: 3
  max_total_nodes: 50
  score_threshold: 0.3
  timeout_per_node: 7200
checkpoint:
  dir: ./checkpoints/{run_id}/
  trigger: per_node_completion
hpc:
  account: ''
  max_nodes: 4
  max_walltime: 04:00:00
  mode: local
  partition: auto
  scheduler: auto
llm:
  api_key: ${ANTHROPIC_API_KEY}
  backend: claude
  model: claude-haiku-4-5
  temperature: 0.7
logging:
  dir: ./logs/{run_id}/
  format: json
  level: INFO
  output: file+stdout
memory:
  backend: local
output:
  format: paper
  venue: arxiv
skills:
# ── BFTS phase: tools used during tree search / experiment execution ─────────
- name: idea-skill
  path: /path/to/ari/ari-skill-idea
  phase: bfts
- name: coding-skill
  path: /path/to/ari/ari-skill-coding
  phase: bfts
- name: hpc-skill
  path: /path/to/ari/ari-skill-hpc
  phase: bfts
- name: benchmark-skill
  path: /path/to/ari/ari-skill-benchmark
  phase: bfts
- name: web-skill
  path: /path/to/ari/ari-skill-web
  phase: bfts
- name: memory-skill
  path: /path/to/ari/ari-skill-memory
  phase: bfts
- name: evaluator-skill
  path: /path/to/ari/ari-skill-evaluator
  phase: bfts
# ── Pipeline phase: tools used AFTER BFTS completes (paper / review) ─────────
- name: paper-skill
  path: /path/to/ari/ari-skill-paper
  phase: pipeline
- name: vlm-skill
  path: /path/to/ari/ari-skill-vlm
  phase: pipeline
- name: review-skill
  path: /path/to/ari/ari-skill-review
  phase: pipeline
- name: paper-re-skill
  path: /path/to/ari/ari-skill-paper-re
  phase: pipeline
- name: plot-skill
  path: /path/to/ari/ari-skill-plot
  phase: pipeline
- name: transform-skill
  path: /path/to/ari/ari-skill-transform
  phase: pipeline
