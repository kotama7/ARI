author_name: Artificial Research Intelligence
pipeline:
- depends_on: []
  description: arXiv keyword search -> related_refs.json
  enabled: true
  inputs:
    limit: 10
    query: '{{keywords}}'
  load_inputs: []
  outputs:
    file: '{{ckpt}}/related_refs.json'
  skill: web-skill
  skip_if_exists: '{{ckpt}}/related_refs.json'
  stage: search_related_work
  tool: search_semantic_scholar
- depends_on: []
  description: Strip BFTS internals -> science_data.json (safe for plot/paper skills)
  enabled: true
  inputs:
    nodes_json_path: '{{ckpt}}/nodes_tree.json'
  load_inputs: []
  outputs:
    file: '{{ckpt}}/science_data.json'
  skill: transform-skill
  skip_if_exists: '{{ckpt}}/science_data.json'
  stage: transform_data
  tool: nodes_to_science_data
- depends_on:
  - transform_data
  description: LLM generates matplotlib code -> PDF figures
  enabled: true
  inputs:
    experiment_summary: '{{paper_context}}'
    n_figures: 3
    nodes_json_path: '{{ckpt}}/nodes_tree.json'
    output_dir: '{{ckpt}}'
    science_data_path: '{{stages.transform_data.outputs.file}}'
  load_inputs: []
  outputs:
    file: '{{ckpt}}/figures_manifest.json'
  skill: plot-skill
  skip_if_exists: '{{ckpt}}/figures_manifest.json'
  stage: generate_figures
  tool: generate_figures_llm
- depends_on:
  - search_related_work
  - generate_figures
  description: AI Scientist v2-style iterative paper writing with BibTeX
  enabled: true
  inputs:
    author_name: '{{author_name}}'
    experiment_summary: '{{paper_context}}'
    figures_manifest_json: '{{ckpt}}/figures_manifest.json'
    max_revision_rounds: 2
    nodes_json_path: '{{ckpt}}/nodes_tree.json'
    refs_json: '{{stages.search_related_work.outputs.file}}'
    venue: arxiv
  load_inputs:
  - figures_manifest_json
  - refs_json
  outputs:
    bib_file: '{{ckpt}}/refs.bib'
    file: '{{ckpt}}/full_paper.tex'
  skill: paper-skill
  skip_if_exists: '{{ckpt}}/full_paper.tex'
  stage: write_paper
  tool: write_paper_iterative
- depends_on:
  - write_paper
  description: 'AI Scientist v2-style review: PDF->text, figure captions, holistic
    LLM evaluation'
  enabled: true
  inputs:
    experiment_summary: '{{paper_context}}'
    figures_manifest_json: '{{ckpt}}/figures_manifest.json'
    pdf_path: '{{ckpt}}/full_paper.pdf'
    tex_path: '{{ckpt}}/full_paper.tex'
  load_inputs:
  - figures_manifest_json
  outputs:
    file: '{{ckpt}}/review_report.json'
  skill: paper-skill
  skip_if_exists: '{{ckpt}}/review_report.json'
  stage: review_paper
  tool: review_compiled_paper
- depends_on:
  - write_paper
  description: 'ReAct reproducibility: extract config from paper -> run HPC job ->
    verify'
  enabled: true
  inputs:
    paper_path: '{{ckpt}}/full_paper.tex'
    cpus: 64
    timeout_minutes: 15
    tolerance_pct: 5.0
    work_dir: '{{ckpt}}/repro'
    # executor: resolved from ARI_EXECUTOR env (local/slurm/pbs/lsf)
  load_inputs: []
  outputs:
    file: '{{ckpt}}/reproducibility_report.json'
  skill: paper-re-skill
  skip_if_exists: '{{ckpt}}/reproducibility_report.json'
  stage: reproducibility_check
  tool: reproduce_from_paper
skills:
- description: DuckDuckGo / arXiv search (deterministic, no LLM)
  name: web-skill
  path: '{{ari_root}}/ari-skill-web'
- description: Matplotlib/seaborn figure generation (LLM-assisted)
  name: plot-skill
  path: '{{ari_root}}/ari-skill-plot'
- description: AI Scientist v2-style paper writing [LLM exception to P2]
  name: paper-skill
  path: '{{ari_root}}/ari-skill-paper'
- description: Reproducibility check against experiment nodes
  name: paper-re-skill
  path: '{{ari_root}}/ari-skill-paper-re'
- description: Persistent key-value memory for experiment context
  name: memory-skill
  path: '{{ari_root}}/ari-skill-memory'
- description: BFTS node evaluation (runs HPC jobs, parses metrics)
  name: evaluator-skill
  path: '{{ari_root}}/ari-skill-evaluator'
- description: Hypothesis / experiment idea generation
  name: idea-skill
  path: '{{ari_root}}/ari-skill-idea'
- description: SLURM job submission and monitoring
  name: hpc-skill
  path: '{{ari_root}}/ari-skill-hpc'
- description: Convert BFTS internal data to science-facing format (strips label/depth/node_id)
  name: transform-skill
  path: '{{ari_root}}/ari-skill-transform'
version: '1'
