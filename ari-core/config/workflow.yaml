llm:
  backend: openai
  model: gpt-5.2
  base_url: ''
memory:
  backend: letta
  letta:
    base_url: http://localhost:8283
    collection_prefix: ari_
    embedding_config: letta-default
resources:
  cpus: 48
  timeout_minutes: 60
  executor: slurm
author_name: Autonomous Research Infrastructure
plan_promote: index_only
lineage_decision:
  mode: stagnation_rule
  stagnation_window: 5
  stagnation_threshold: 0.05
  min_nodes_before_decision: 3
  rate_limit_per_run: 5
root_idea_selection:
  enabled: true
# Story2Proposal Phase B3: claim_evidence_hard_gate policy. Consumed by the claim
# stages below (enabled by default in warn mode). mode controls blocking (off never
# blocks; warn = default report-only; strict = blocks the FINAL gate on blocking
# errors). env ARI_CLAIM_GATE_MODE overrides mode at runtime.
claim_gate_policy:
  mode: warn
  # Injected research intent (env ARI_COMPARISON_SCOPE overrides): any (default;
  # cross-environment comparison = transparency warning, for cross-architecture
  # studies) | same_environment (cross-env comparison = blocking error, for
  # single-architecture optimization studies).
  comparison_scope: any
  numeric_coverage:
    target_sections:
      strict: [abstract, results, conclusion]
      warn: [introduction, discussion, limitations]
      excluded: [related_work, references, appendix, equations]
  numeric_match:
    default_tolerance: {absolute: 0.0, relative: 0.02}
  blocking:
    block_on: [numeric_mismatch, operand_unresolved, missing_evidence]
bfts_pipeline:
- stage: generate_idea
  skill: idea-skill
  tool: generate_ideas
  description: LLM generates research hypotheses; BFTS creates root node
  depends_on: []
  enabled: true
  phase: bfts
- stage: select_and_run
  skill: hpc-skill
  tool: ''
  description: BFTS selects best node; ReAct agent runs experiment (code generation,
    HPC submission, result parsing)
  depends_on:
  - generate_idea
  enabled: true
  phase: bfts
- stage: evaluate
  skill: evaluator-skill
  tool: evaluate_node
  description: LLM evaluator scores node, extracts metrics, determines scientific
    contribution
  depends_on:
  - select_and_run
  enabled: true
  phase: bfts
- stage: analyze_results
  skill: benchmark-skill
  tool: analyze_results
  description: Statistical analysis of experiment metrics
  depends_on:
  - evaluate
  enabled: true
  phase: bfts
- stage: frontier_expand
  skill: idea-skill
  tool: generate_ideas
  description: BFTS expands best completed node into children; loops back to select_and_run
  depends_on:
  - analyze_results
  enabled: true
  phase: bfts
  loop_back_to: select_and_run
pipeline:
- stage: search_related_work
  skill: web-skill
  tool: collect_references_iterative
  description: AI Scientist v2-style iterative citation collection -> related_refs.json
  depends_on: []
  enabled: true
  phase: paper
  inputs:
    experiment_summary: '{{experiment_summary}}'
    keywords: '{{keywords}}'
  outputs:
    file: '{{checkpoint_dir}}/related_refs.json'
- stage: transform_data
  skill: transform-skill
  tool: nodes_to_science_data
  description: LLM-powered experiment tree analysis -> science_data.json
  depends_on: []
  enabled: true
  phase: paper
  inputs:
    nodes_json_path: '{{checkpoint_dir}}/tree.json'
    primary_metric: '{{primary_metric}}'
    higher_is_better: '{{higher_is_better}}'
  outputs:
    file: '{{checkpoint_dir}}/science_data.json'
- stage: generate_ear
  skill: transform-skill
  tool: generate_ear
  description: Build the EAR
  depends_on:
  - transform_data
  enabled: true
  phase: paper
  inputs:
    checkpoint_dir: '{{checkpoint_dir}}'
  outputs:
    file: '{{checkpoint_dir}}/ear_manifest.json'
- stage: ear_curate
  skill: transform-skill
  tool: curate_ear
  description: Curate {checkpoint}/ear/ into {checkpoint}/ear_published/ via publish.yaml.
    Skips silently if publish.yaml is absent (back-compat for v0.6.0 checkpoints).
    The MCP tool itself writes ear_published/manifest.lock; the workflow output here
    is a small status JSON so pipeline writes never collide with the real manifest
    (which is the trust anchor baked into the paper).
  depends_on:
  - generate_ear
  enabled: true
  phase: paper
  inputs:
    checkpoint_dir: '{{checkpoint_dir}}'
  outputs:
    file: '{{checkpoint_dir}}/ear_curate.status.json'
- stage: generate_figures
  skill: plot-skill
  tool: generate_figures_llm
  description: LLM generates matplotlib code -> PDF figures
  depends_on:
  - transform_data
  enabled: true
  phase: paper
  inputs:
    nodes_json_path: '{{checkpoint_dir}}/tree.json'
    science_data_path: '{{checkpoint_dir}}/science_data.json'
    n_figures: 3
    output_dir: '{{checkpoint_dir}}'
    experiment_summary: '{{experiment_summary}}'
    vlm_feedback: '{{vlm_feedback}}'
  outputs:
    file: '{{checkpoint_dir}}/figures_manifest.json'
- stage: vlm_review_figures
  skill: vlm-skill
  tool: review_figures_all
  description: VLM-based visual review of every figure in figures_manifest.json. Aggregate
    score = min across figures, so a single weak figure trips loop_back and forces
    regeneration. issues/suggestions are prefixed with [fig_id] so the plot-skill
    regenerator knows which figure to fix.
  depends_on:
  - generate_figures
  enabled: true
  phase: paper
  loop_back_to: generate_figures
  loop_threshold: 0.7
  loop_max_iterations: 2
  inputs:
    figures_manifest_path: '{{checkpoint_dir}}/figures_manifest.json'
    context: '{{experiment_summary}}'
  outputs:
    file: '{{checkpoint_dir}}/vlm_review.json'
- stage: write_paper
  skill: paper-skill
  tool: write_paper_iterative
  description: AI Scientist v2-style iterative paper writing with BibTeX
  depends_on:
  - search_related_work
  - generate_figures
  - generate_ear
  enabled: true
  phase: paper
  inputs:
    experiment_summary: '{{experiment_summary}}'
    nodes_json_path: '{{checkpoint_dir}}/tree.json'
    figures_manifest_json: '{{checkpoint_dir}}/figures_manifest.json'
    refs_json: '{{checkpoint_dir}}/related_refs.json'
    science_data_json: '{{checkpoint_dir}}/science_data.json'
    # Verified context is passed as a PATH and read inside write_paper_iterative.
    # Deliberately NOT in load_inputs: keeping it out of the stage's loaded-content
    # set means the write_paper stage-config / dependency resolution is unchanged,
    # so the (separately-wired) claim stages' topology is not perturbed. Absent
    # file (ARI_MEMORY_CONSOLIDATE off) => write_paper injects nothing.
    verified_context_json: '{{checkpoint_dir}}/verified_context.json'
  load_inputs:
  - figures_manifest_json
  - refs_json
  - science_data_json
  outputs:
    file: '{{checkpoint_dir}}/full_paper.tex'
    bib_file: '{{checkpoint_dir}}/refs.bib'
  skip_if_exists: '{{checkpoint_dir}}/full_paper.tex'
# ─────────────────────────────────────────────────────────────────────────────
# Story2Proposal contract-governed generation loop (Phases A2/B/D/E).
# The topology below is back-ported from the validated checkpoint run: the stages
# are in dependency order (link_draft -> gate_draft -> review -> semantic -> merge
# -> refine -> render -> link_final -> semantic_post -> gate_final -> finalize),
# finalize_paper depends on the FINAL hard gate (blocking contract wired), and
# merge_reviews receives the hard-gate + semantic-review paths. The S2P stages are
# ENABLED BY DEFAULT in warn mode (claim_gate_policy.mode: warn) — the loop runs on
# every paper build but the gate only reports (never blocks). The orchestrator runs
# stages in file order with no topological sort, so this dependency order is what
# keeps the loop correct. To make the final gate BLOCKING (skip finalize on numeric
# mismatch / uncovered numbers), set claim_gate_policy.mode: strict or
# ARI_CLAIM_GATE_MODE=strict. To opt a single stage out, set its enabled: false.
# ─────────────────────────────────────────────────────────────────────────────
- stage: link_paper_claims_draft
  skill: paper-skill
  tool: link_paper_claims
  description: 'S2P Phase A2: reconcile % CLAIM:Cx:NCx anchors -> paper_claim_links.json.'
  depends_on:
  - write_paper
  enabled: true
  phase: paper
  inputs:
    tex_path: '{{checkpoint_dir}}/full_paper.tex'
    science_data_json: '{{checkpoint_dir}}/science_data.json'
    figures_manifest_json: '{{checkpoint_dir}}/figures_manifest.json'
  load_inputs:
  - science_data_json
  - figures_manifest_json
  outputs:
    file: '{{checkpoint_dir}}/paper_claim_links.json'
- stage: claim_evidence_hard_gate_draft
  skill: evaluator-skill
  tool: claim_evidence_hard_gate
  description: 'S2P Phase B: deterministic claim/evidence hard gate (draft, non-blocking).'
  depends_on:
  - link_paper_claims_draft
  - transform_data
  enabled: true
  phase: paper
  inputs:
    checkpoint_dir: '{{checkpoint_dir}}'
    paper_path: '{{checkpoint_dir}}/full_paper.tex'
    science_data_json: '{{checkpoint_dir}}/science_data.json'
    paper_claim_links_path: '{{checkpoint_dir}}/paper_claim_links.json'
    figures_manifest_json: '{{checkpoint_dir}}/figures_manifest.json'
    policy: '{{claim_gate_policy}}'
    phase: draft
  load_inputs:
  - science_data_json
  - figures_manifest_json
  outputs:
    file: '{{checkpoint_dir}}/evaluation/claim_evidence_hard_gate_draft.json'
- stage: review_paper
  skill: paper-skill
  tool: review_compiled_paper
  description: 'Rubric-driven paper review (AI Scientist v1/v2-compatible, NeurIPS
    form + reflection). Runs N independent reviewers via the ensemble path; when N>1,
    also runs the Area Chair meta-review to aggregate divergent scores. N=1 is a single
    reviewer. Reviewer independence contract: this stage evaluates paper text only
    (no VLM findings, no experiment brief, no figures manifest) to match AI Scientist
    v2''s perform_review. VLM review runs independently (vlm_review_figures) and is
    combined post-hoc by merge_reviews. rubric_id, fewshot_mode, num_reflections,
    num_reviews_ensemble are read from environment variables: ARI_RUBRIC, ARI_FEWSHOT_MODE,
    ARI_NUM_REFLECTIONS, ARI_NUM_REVIEWS_ENSEMBLE.'
  depends_on:
  - write_paper
  enabled: true
  phase: paper
  inputs:
    tex_path: '{{checkpoint_dir}}/full_paper.tex'
    pdf_path: '{{checkpoint_dir}}/full_paper.pdf'
  outputs:
    file: '{{checkpoint_dir}}/review_report.json'
- stage: evidence_grounded_semantic_review
  skill: evaluator-skill
  tool: evidence_grounded_semantic_review
  description: 'S2P Phase D: non-blocking evidence-grounded semantic review.'
  depends_on:
  - claim_evidence_hard_gate_draft
  enabled: true
  phase: paper
  inputs:
    checkpoint_dir: '{{checkpoint_dir}}'
    paper_path: '{{checkpoint_dir}}/full_paper.tex'
    science_data_json: '{{checkpoint_dir}}/science_data.json'
    hard_gate_path: '{{checkpoint_dir}}/evaluation/claim_evidence_hard_gate_draft.json'
    paper_claim_links_path: '{{checkpoint_dir}}/paper_claim_links.json'
    phase: initial
  load_inputs:
  - science_data_json
  outputs:
    file: '{{checkpoint_dir}}/evaluation/evidence_grounded_semantic_review.json'
- stage: merge_reviews
  skill: paper-skill
  tool: merge_reviews
  description: Post-hoc merge of the independent text reviewer output (review_report.json)
    with the independent VLM figure review (vlm_review.json). Purely structural merge
    — no LLM call. Attaches vlm_figure_review and _review_composition metadata to
    review_report.json so downstream consumers (GUI, CLI) can see both outputs with
    clear source attribution. Also threads the evidence-grounded reviews (hard gate +
    semantic review) so the merged report separates independent vs evidence-grounded
    review categories (S2P Phase E).
  depends_on:
  - review_paper
  - vlm_review_figures
  enabled: true
  phase: paper
  inputs:
    review_report_path: '{{checkpoint_dir}}/review_report.json'
    vlm_review_path: '{{checkpoint_dir}}/vlm_review.json'
    hard_gate_path: '{{checkpoint_dir}}/evaluation/claim_evidence_hard_gate_draft.json'
    semantic_review_path: '{{checkpoint_dir}}/evaluation/evidence_grounded_semantic_review.json'
  outputs:
    file: '{{checkpoint_dir}}/review_merge_log.json'
- stage: paper_refine
  skill: paper-skill
  tool: paper_refine
  description: 'S2P Phase E: apply suggested_revisions, preserving % CLAIM anchors.'
  depends_on:
  - merge_reviews
  enabled: true
  phase: paper
  inputs:
    tex_path: '{{checkpoint_dir}}/full_paper.tex'
    merged_review_path: '{{checkpoint_dir}}/review_merge_log.json'
    semantic_review_path: '{{checkpoint_dir}}/evaluation/evidence_grounded_semantic_review.json'
  outputs:
    file: '{{checkpoint_dir}}/full_paper.tex'
- stage: render_paper
  skill: paper-skill
  tool: compile_paper
  description: 'S2P renderer (A_rend, eq.6 M=A_rend(M'',C)): recompile the refined
    full_paper.tex -> full_paper.pdf so the delivered PDF reflects paper_refine (the
    prior PDF came from write_paper, pre-refine). Non-blocking — nothing depends on
    it, and a LaTeX failure leaves the previous PDF rather than breaking the finalize
    chain (the .tex remains the gate/finalize source of truth).'
  depends_on:
  - paper_refine
  enabled: true
  phase: paper
  inputs:
    tex_dir: '{{checkpoint_dir}}'
    main_file: full_paper.tex
  outputs:
    file: '{{checkpoint_dir}}/full_paper.pdf'
- stage: link_paper_claims_final
  skill: paper-skill
  tool: link_paper_claims
  description: 'S2P Phase A2: re-run claim-id post-processing on the refined paper.'
  depends_on:
  - paper_refine
  enabled: true
  phase: paper
  inputs:
    tex_path: '{{checkpoint_dir}}/full_paper.tex'
    science_data_json: '{{checkpoint_dir}}/science_data.json'
    figures_manifest_json: '{{checkpoint_dir}}/figures_manifest.json'
  load_inputs:
  - science_data_json
  - figures_manifest_json
  outputs:
    file: '{{checkpoint_dir}}/paper_claim_links_final.json'
- stage: evidence_grounded_semantic_review_post_refine
  skill: evaluator-skill
  tool: evidence_grounded_semantic_review
  description: 'S2P Phase E: re-run semantic review on the refined paper (score_delta).'
  depends_on:
  - paper_refine
  enabled: true
  phase: paper
  inputs:
    checkpoint_dir: '{{checkpoint_dir}}'
    paper_path: '{{checkpoint_dir}}/full_paper.tex'
    science_data_json: '{{checkpoint_dir}}/science_data.json'
    hard_gate_path: '{{checkpoint_dir}}/evaluation/claim_evidence_hard_gate_draft.json'
    paper_claim_links_path: '{{checkpoint_dir}}/paper_claim_links_final.json'
    phase: post_refine
  load_inputs:
  - science_data_json
  outputs:
    file: '{{checkpoint_dir}}/evaluation/evidence_grounded_semantic_review_post_refine.json'
- stage: claim_evidence_hard_gate_final
  skill: evaluator-skill
  tool: claim_evidence_hard_gate
  description: 'S2P Phase B: deterministic hard gate (FINAL, refined paper; blocks finalize in strict mode).'
  depends_on:
  - link_paper_claims_final
  enabled: true
  phase: paper
  inputs:
    checkpoint_dir: '{{checkpoint_dir}}'
    paper_path: '{{checkpoint_dir}}/full_paper.tex'
    science_data_json: '{{checkpoint_dir}}/science_data.json'
    paper_claim_links_path: '{{checkpoint_dir}}/paper_claim_links_final.json'
    figures_manifest_json: '{{checkpoint_dir}}/figures_manifest.json'
    policy: '{{claim_gate_policy}}'
    phase: final
  load_inputs:
  - science_data_json
  - figures_manifest_json
  outputs:
    file: '{{checkpoint_dir}}/evaluation/claim_evidence_hard_gate_final.json'
- stage: ear_publish
  description: Package the curated EAR into a local tarball + publish_record.json
    so the ORS sandbox can fetch it via fetch_code_bundle. Default backend is local-tarball
    (zero deps, lives next to the checkpoint); switch to ari-registry / zenodo / gh
    to publish externally. Always visibility=staged.
  skill: transform-skill
  tool: publish_ear
  depends_on:
  - ear_curate
  enabled: true
  phase: paper
  inputs:
    checkpoint_dir: '{{checkpoint_dir}}'
    backend: local-tarball
    visibility: staged
    dry_run: false
  outputs:
    file: '{{checkpoint_dir}}/publish_record.json'
- stage: finalize_paper
  skill: paper-skill
  tool: inject_code_availability
  description: Inject the Code Availability section + machine-readable \codeavailability/\codedigest/\coderef
    macros into full_paper.tex. Skips silently when no curated bundle is available
    (publish.yaml absent or curate skipped). The injector auto-loads ref/sha/doi from
    ear_published/manifest.lock and publish_record.json so the workflow does not need
    to thread these values stage-to-stage.
  depends_on:
  - write_paper
  - ear_curate
  - ear_publish
  - claim_evidence_hard_gate_final
  enabled: true
  phase: paper
  inputs:
    tex_path: '{{checkpoint_dir}}/full_paper.tex'
    checkpoint_dir: '{{checkpoint_dir}}'
  outputs:
    file: '{{checkpoint_dir}}/finalize_paper.json'
- stage: ors_generate_rubric
  skill: replicate-skill
  tool: generate_rubric
  description: Auto-generate a PaperBench-format rubric from the final paper. The
    tool writes the full rubric envelope to `output_path` (ors_rubric.json); `outputs.file`
    records the metadata return dict separately so the envelope is not overwritten.
  depends_on:
  - write_paper
  enabled: true
  phase: paper
  inputs:
    paper_path: '{{checkpoint_dir}}/full_paper.tex'
    output_path: '{{checkpoint_dir}}/ors_rubric.json'
    target_leaf_count: 0
  outputs:
    file: '{{checkpoint_dir}}/ors_rubric.meta.json'
- stage: ors_seed_sandbox
  skill: paper-re-skill
  tool: fetch_code_bundle
  description: Seed repro_sandbox/ from the curated EAR bundle published by ear_publish
    (file:// local-tarball by default). When ear is OFF or ear_publish skipped, publish_record.json
    is absent and this stage no-ops so the next stage (ors_build_reproduce) drives
    the LLM-only fallback.
  depends_on:
  - ear_publish
  enabled: true
  phase: paper
  inputs:
    checkpoint_dir: '{{checkpoint_dir}}'
    dest: '{{checkpoint_dir}}/repro_sandbox'
  outputs:
    file: '{{checkpoint_dir}}/ors_seed.json'
- stage: ors_build_reproduce
  skill: paper-re-skill
  tool: build_reproduce_sh
  description: Replicator — drive PaperBench's BasicAgent / IterativeAgent (vendored
    under ari-skill-paper-re/vendor/paperbench) against the workspace at repro_sandbox/.
    The agent reads the paper and the rubric's expected_artifacts and writes
    reproduce.sh + supporting source by repeatedly invoking bash/python tools until
    submit (or time_limit_sec). v0.7+ replaced the v0.6 single-shot LLM replicator;
    see CHANGELOG. Skipped automatically when reproduce.sh is already present.
  depends_on:
  - ors_generate_rubric
  - ors_seed_sandbox
  - finalize_paper
  enabled: true
  phase: paper
  inputs:
    paper_path: '{{checkpoint_dir}}/full_paper.tex'
    rubric_path: '{{checkpoint_dir}}/ors_rubric.json'
    output_dir: '{{checkpoint_dir}}/repro_sandbox'
    # Replicator agent parameters. Empty strings / 0 trigger the MCP tool's
    # built-in defaults (see ari-skill-paper-re/src/server.py::build_reproduce_sh)
    # which read ARI_REPLICATOR_* env vars set by api_experiment.py from
    # the wizard / launch_config.json.
    model: ''
    time_limit_sec: 0
    iterative_agent: false
    max_steps: 0
    sandbox_kind: auto
    container_image: ''
    overwrite: false
  outputs:
    file: '{{checkpoint_dir}}/ors_replicator.json'
- stage: ors_run_reproduce
  skill: paper-re-skill
  tool: run_reproduce
  description: Phase 1 — execute reproduce.sh in the configured sandbox. Auto sandbox
    priority slurm > docker > apptainer > singularity > local. sandbox_kind=slurm
    fires when sbatch is on PATH and ARI_SLURM_PARTITION is set (i.e. the same partition
    BFTS used). partition / cpus / walltime blank → run_reproduce resolves from ARI_SLURM_*
    env then from launch_config.json. ARI_PHASE1_SANDBOX overrides everything.
  depends_on:
  - ors_generate_rubric
  - ors_build_reproduce
  enabled: true
  phase: paper
  inputs:
    rubric_path: '{{checkpoint_dir}}/ors_rubric.json'
    repo_dir: '{{checkpoint_dir}}/repro_sandbox'
    sandbox_kind: ''
    container_image: ''
    timeout_global_sec: 0
    partition: ''
    cpus: 0
    walltime: ''
  outputs:
    file: '{{checkpoint_dir}}/ors_phase1.json'
- stage: ors_grade
  skill: paper-re-skill
  tool: grade_with_simplejudge
  description: Phase 2 — score the post-reproduce submission with PaperBench SimpleJudge.
    Main per-leaf judge runs through LiteLLM, so judge_model accepts any provider
    LiteLLM understands (gpt-5-mini, anthropic/claude-..., gemini/..., ollama/...).
    n_runs default is 1 to match PaperBench paper §4.1 (single-pass judging);
    increase for variance reduction at the cost of grading API spend.
  depends_on:
  - ors_run_reproduce
  enabled: true
  phase: paper
  inputs:
    rubric_path: '{{checkpoint_dir}}/ors_rubric.json'
    repo_dir: '{{checkpoint_dir}}/repro_sandbox'
    paper_path: '{{checkpoint_dir}}/full_paper.tex'
    # n_runs / judge_model: 0 / empty triggers the MCP tool's default
    # (read from ARI_JUDGE_N_RUNS / ARI_MODEL_JUDGE env vars set by
    # api_experiment.py from the wizard); paper §4.1 single-pass = 1.
    n_runs: 0
    judge_model: ''
  outputs:
    file: '{{checkpoint_dir}}/ors_grade.json'
skills:
- description: DuckDuckGo / arXiv search (deterministic, no LLM)
  name: web-skill
  path: '{{ari_root}}/ari-skill-web'
  phase:
  - paper
  - reproduce
- description: Matplotlib/seaborn figure generation (LLM-assisted)
  name: plot-skill
  path: '{{ari_root}}/ari-skill-plot'
  phase: paper
- description: AI Scientist v2-style paper writing [LLM exception to P2]
  name: paper-skill
  path: '{{ari_root}}/ari-skill-paper'
  phase: paper
- description: Reproducibility check against experiment nodes
  name: paper-re-skill
  path: '{{ari_root}}/ari-skill-paper-re'
  phase: paper
- description: PaperBench-format auto-rubric generator (ORS Phase 0)
  name: replicate-skill
  path: '{{ari_root}}/ari-skill-replicate'
  phase: paper
- description: Persistent key-value memory for experiment context
  name: memory-skill
  path: '{{ari_root}}/ari-skill-memory'
  phase: bfts
- description: BFTS node evaluation (runs HPC jobs, parses metrics)
  name: evaluator-skill
  path: '{{ari_root}}/ari-skill-evaluator'
  phase: bfts
- description: Hypothesis / experiment idea generation
  name: idea-skill
  path: '{{ari_root}}/ari-skill-idea'
  phase: bfts
- description: SLURM job submission and Singularity container operations
  name: hpc-skill
  path: '{{ari_root}}/ari-skill-hpc'
  phase:
  - bfts
  - reproduce
- description: Code writing / reading / bash execution (container-aware)
  name: coding-skill
  path: '{{ari_root}}/ari-skill-coding'
  phase:
  - bfts
  - reproduce
- description: Convert BFTS internal data to science-facing format (strips label/depth/node_id)
  name: transform-skill
  path: '{{ari_root}}/ari-skill-transform'
  phase: paper
- description: Experiment result analysis and statistical testing
  name: benchmark-skill
  path: '{{ari_root}}/ari-skill-benchmark'
  phase: bfts
- description: VLM-based figure and table review
  name: vlm-skill
  path: '{{ari_root}}/ari-skill-vlm'
  phase:
  - paper
  - reproduce
version: '1'
retrieval:
  backend: semantic_scholar
  alphaxiv_endpoint: https://api.alphaxiv.org/mcp/v1
container:
  mode: auto
  image: ''
  pull: on_start
disabled_tools: []
