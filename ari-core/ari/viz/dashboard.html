<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ARI Experiment Monitor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#242736;--border:#2d3148;
  --text:#e2e8f0;--muted:#94a3b8;--accent:#6366f1;
  --success:#22c55e;--fail:#ef4444;--running:#3b82f6;--pending:#6b7280;--abandoned:#374151;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* NAV */
nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:16px;flex-shrink:0}
nav .title{font-size:1.1rem;font-weight:700;color:var(--text)}
nav .dot{width:10px;height:10px;border-radius:50%;background:var(--fail);transition:background .3s}
nav .dot.on{background:var(--success)}
nav .meta{font-size:.8rem;color:var(--muted);margin-left:auto}
nav .ckpt{font-size:.75rem;color:var(--muted);max-width:400px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* MAIN */
.main{display:flex;flex:1;overflow:hidden}

/* TREE PANEL */
.tree-panel{flex:0 0 60%;border-right:1px solid var(--border);overflow:auto;position:relative}
.tree-panel svg{display:block}

/* DETAIL PANEL */
.detail-panel{flex:1;overflow-y:auto;padding:20px;background:var(--bg)}
.detail-panel.empty{display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:.9rem}
.detail h2{font-size:1rem;margin-bottom:16px;color:var(--text)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.75rem;font-weight:600}
.badge.success{background:#14532d;color:#86efac}
.badge.failed{background:#450a0a;color:#fca5a5}
.badge.running{background:#1e3a5f;color:#93c5fd}
.badge.pending{background:#1f2937;color:#9ca3af}
.badge.abandoned{background:#111827;color:#4b5563}
.detail-row{margin-bottom:14px}
.detail-row .label{font-size:.75rem;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.detail-row .value{font-size:.9rem;color:var(--text)}
.metric-val{font-size:1.4rem;font-weight:700;color:var(--success)}
.eval-box{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:10px;font-size:.8rem;line-height:1.6;color:var(--muted);max-height:180px;overflow-y:auto}
.error-box{background:#1c0a0a;border:1px solid #7f1d1d;border-radius:6px;padding:10px;font-size:.75rem;font-family:monospace;color:#fca5a5;max-height:120px;overflow-y:auto}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab-btn{padding:6px 14px;font-size:.8rem;cursor:pointer;background:none;border:none;color:var(--muted);border-bottom:2px solid transparent;transition:color .15s}
.tab-btn.active{color:var(--text);border-bottom-color:var(--accent)}
.tab-btn:hover{color:var(--text)}
.tab-pane{display:none}
.tab-pane.active{display:block}
.trace-entry{display:flex;gap:8px;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--border)}
.trace-icon{font-size:.7rem;padding:2px 6px;border-radius:3px;background:var(--bg3);color:var(--muted);flex-shrink:0;margin-top:2px;font-family:monospace}
.trace-text{font-size:.75rem;color:var(--muted);line-height:1.5;word-break:break-word;flex:1}
.trace-text b{color:var(--text)}
.code-block{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:12px;font-size:.72rem;font-family:monospace;color:#a5f3fc;line-height:1.5;overflow-x:auto;white-space:pre;max-height:400px;overflow-y:auto}
.stdout-block{background:#0a1a0a;border:1px solid #1a3a1a;border-radius:6px;padding:12px;font-size:.72rem;font-family:monospace;color:#86efac;line-height:1.5;overflow-x:auto;white-space:pre;max-height:400px;overflow-y:auto}
.parent-chain{font-size:.8rem;color:var(--muted)}
.parent-chain span{color:var(--accent)}

/* STATUS BAR */
.statusbar{background:var(--bg2);border-top:1px solid var(--border);padding:6px 20px;display:flex;gap:24px;font-size:.8rem;color:var(--muted);flex-shrink:0}
.statusbar b{color:var(--text)}

/* SVG tree nodes */
.node-circle{cursor:pointer;transition:opacity .2s}
.node-circle:hover{filter:brightness(1.3)}
.node-circle.selected{stroke:#fff;stroke-width:2}
.node-label{font-size:9px;fill:var(--muted);text-anchor:middle;pointer-events:none}
.node-id{font-size:8px;fill:#64748b;text-anchor:middle;pointer-events:none}
.edge{fill:none;stroke:#2d3148;stroke-width:1.5}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.running-pulse{animation:pulse 1.5s ease-in-out infinite}
@keyframes flash{0%{filter:brightness(3)}100%{filter:brightness(1)}}
.flash{animation:flash .8s ease-out}
</style>
</head>
<body>

<nav>
  <span class="title">⚗️ ARI Experiment Monitor</span>
  <span class="dot" id="dot"></span>
  <span id="connstat" style="font-size:.8rem;color:var(--muted)">Disconnected</span>
  <span class="meta" id="lastup">—</span>
  <span class="ckpt" id="ckptpath">—</span>
</nav>

<div class="main">
  <div class="tree-panel" id="treePanel">
    <svg id="treeSvg"></svg>
  </div>
  <div class="detail-panel empty" id="detailPanel">
    <span>← Click a node to see details</span>
  </div>
</div>

<div class="statusbar">
  <span>Nodes: <b id="sb-total">0</b></span>
  <span>✅ <b id="sb-ok">0</b></span>
  <span>❌ <b id="sb-fail">0</b></span>
  <span>🔵 <b id="sb-run">0</b></span>
  <span>⏳ <b id="sb-pend">0</b></span>
  <span id="sb-best" style="margin-left:auto"></span>
</div>

<script>
// ── State ──────────────────────────────────────────────
var state = {nodes: [], goal: ""};
var selectedId = null;
var prevNodeStatus = {};  // id → status for flash detection

// ── WebSocket ──────────────────────────────────────────
var ws = null;
var wsPort = (parseInt(window.location.port) + 1) || "8766";
var wsUrl = "ws://localhost:" + wsPort + "/ws";

function connect() {
  ws = new WebSocket(wsUrl);
  ws.onopen = function() {
    document.getElementById("dot").className = "dot on";
    document.getElementById("connstat").textContent = "Connected";
  };
  ws.onmessage = function(e) {
    var msg = JSON.parse(e.data);
    if (msg.type === "update") {
      applyUpdate(msg.data, msg.timestamp);
    }
  };
  ws.onclose = ws.onerror = function() {
    document.getElementById("dot").className = "dot";
    document.getElementById("connstat").textContent = "Reconnecting...";
    setTimeout(connect, 3000);
  };
}

function applyUpdate(data, ts) {
  // Detect changed nodes for flash
  var newStatus = {};
  (data.nodes || []).forEach(function(n){ newStatus[n.id] = n.status; });

  state = data;
  document.getElementById("lastup").textContent = "Updated: " + new Date(ts).toLocaleTimeString();
  if (data.experiment_goal) {
    // Strip HTML comments and extract first heading or non-empty line
    var rawGoal = data.experiment_goal || "";
    // If it looks like a file path, use just the basename
    if (rawGoal && !rawGoal.includes("\n") && rawGoal.includes("/")) {
      rawGoal = rawGoal.split("/").pop().replace(/\.md$/i,"");
    }
    var cleaned = rawGoal.replace(/<!--[\s\S]*?-->/g, "").trim();
    var firstLine = cleaned.split("\n").map(function(l){return l.replace(/^#+\s*/,"").trim();}).filter(Boolean)[0] || "—";
    document.getElementById("ckptpath").textContent = firstLine.substring(0, 80);
  }
  renderTree(newStatus);
  updateStatusBar();
  if (selectedId) showDetail(selectedId);

  prevNodeStatus = newStatus;
}

// Also try HTTP fallback on load
fetch("/state").then(function(r){ return r.json(); }).then(function(d){
  applyUpdate(d, new Date().toISOString());
}).catch(function(){});

connect();

// ── Tree Layout ────────────────────────────────────────
function buildTree(nodes) {
  var map = {};
  nodes.forEach(function(n){ map[n.id] = Object.assign({}, n, {_children: []}); });
  var roots = [];
  nodes.forEach(function(n){
    if (n.parent_id && map[n.parent_id]) {
      map[n.parent_id]._children.push(map[n.id]);
    } else {
      roots.push(map[n.id]);
    }
  });
  return {map: map, roots: roots};
}

var NODE_R = 18;
var H_GAP = 52;
var V_GAP = 65;

function assignPositions(roots) {
  // Count leaves under each node to space horizontally
  function countLeaves(n) {
    if (n._children.length === 0) return 1;
    return n._children.reduce(function(s,c){ return s + countLeaves(c); }, 0);
  }
  function assign(n, depth, left, width) {
    n._y = 40 + depth * V_GAP;
    n._x = left + width / 2;
    var cLeft = left;
    n._children.forEach(function(c){
      var cWidth = (countLeaves(c) / Math.max(countLeaves(n), 1)) * width;
      assign(c, depth + 1, cLeft, cWidth);
      cLeft += cWidth;
    });
  }
  var totalLeaves = roots.reduce(function(s,r){ return s + countLeaves(r); }, 0);
  var totalWidth = Math.max(totalLeaves * (NODE_R * 2 + H_GAP), 600);
  var x = 0;
  roots.forEach(function(r){
    var w = (countLeaves(r) / totalLeaves) * totalWidth;
    assign(r, 0, x, w);
    x += w;
  });
  return totalWidth;
}

var STATUS_COLOR = {
  success: "#22c55e", failed: "#ef4444", running: "#3b82f6",
  pending: "#6b7280", abandoned: "#374151"
};
var LABEL_EMOJI = {
  draft: "📝", improve: "⬆️", debug: "🔧", ablation: "🔬", validation: "✅"
};

function renderTree(newStatus) {
  var tree = buildTree(state.nodes || []);
  var totalW = assignPositions(tree.roots);
  var panel = document.getElementById("treePanel");
  var svg = document.getElementById("treeSvg");

  // Compute height
  var maxY = 40;
  Object.values(tree.map).forEach(function(n){
    if (n._y > maxY) maxY = n._y;
  });
  var svgH = maxY + 80;
  var svgW = Math.max(totalW, 600);
  // Auto-fit: scale tree to fit panel
  var panelW = panel.clientWidth || 700;
  var panelH = panel.clientHeight || 500;
  var scaleX = panelW / svgW;
  var scaleY = panelH / svgH;
  var scale = Math.min(scaleX, scaleY, 1.0);  // never upscale
  var fitW = svgW * scale;
  var fitH = svgH * scale;
  svg.setAttribute("width", fitW);
  svg.setAttribute("height", fitH);
  svg.setAttribute("viewBox", "0 0 " + svgW + " " + svgH);
  svg.style.display = "block";

  // Clear
  while (svg.firstChild) svg.removeChild(svg.firstChild);

  // Draw edges
  Object.values(tree.map).forEach(function(n){
    n._children.forEach(function(c){
      var path = document.createElementNS("http://www.w3.org/2000/svg","path");
      var x1=n._x, y1=n._y, x2=c._x, y2=c._y;
      var mx=(x1+x2)/2, my=(y1+y2)/2;
      path.setAttribute("d", "M"+x1+","+y1+" C"+x1+","+(y1+V_GAP*0.5)+" "+x2+","+(y2-V_GAP*0.5)+" "+x2+","+y2);
      path.setAttribute("class","edge");
      svg.appendChild(path);
    });
  });

  // Draw nodes
  Object.values(tree.map).forEach(function(n){
    var g = document.createElementNS("http://www.w3.org/2000/svg","g");
    g.setAttribute("transform","translate("+n._x+","+n._y+")");
    g.setAttribute("data-node-id", n.id);
    g.setAttribute("role","button");
    g.setAttribute("aria-label","node-"+n.id);
    g.style.cursor = "pointer";

    var color = STATUS_COLOR[n.status] || "#6b7280";
    var circle = document.createElementNS("http://www.w3.org/2000/svg","circle");
    circle.setAttribute("r", NODE_R);
    circle.setAttribute("fill", color);
    circle.setAttribute("fill-opacity", "0.85");
    circle.setAttribute("stroke", n.id === selectedId ? "#fff" : color);
    circle.setAttribute("stroke-width", n.id === selectedId ? "2.5" : "0");
    if (n.status === "running") {
      circle.classList.add("running-pulse");
    }
    // Flash on status change
    if (newStatus && newStatus[n.id] && prevNodeStatus[n.id] &&
        newStatus[n.id] !== prevNodeStatus[n.id]) {
      circle.classList.add("flash");
    }
    g.appendChild(circle);

    // Status icon
    var icon = {success:"✓", failed:"✗", running:"▶", pending:"…", abandoned:"—"}[n.status] || "?";
    var itext = document.createElementNS("http://www.w3.org/2000/svg","text");
    itext.setAttribute("y","5"); itext.setAttribute("text-anchor","middle");
    itext.setAttribute("font-size","14"); itext.setAttribute("fill","#fff");
    itext.setAttribute("pointer-events","none");
    itext.textContent = icon;
    g.appendChild(itext);

    // Label badge
    if (n.label) {
      var lt = document.createElementNS("http://www.w3.org/2000/svg","text");
      lt.setAttribute("y", NODE_R + 14);
      lt.setAttribute("class","node-label");
      lt.textContent = (LABEL_EMOJI[n.label]||"") + " " + n.label;
      g.appendChild(lt);
    }

    // Short ID
    var sid = n.id.replace("node_","").substring(0,8);
    var idtext = document.createElementNS("http://www.w3.org/2000/svg","text");
    idtext.setAttribute("y", NODE_R + 26);
    idtext.setAttribute("class","node-id");
    idtext.textContent = sid;
    g.appendChild(idtext);

    g.addEventListener("click", function(){ selectedId = n.id; showDetail(n.id); renderTree(null); });
    svg.appendChild(g);
  });
}

// ── Detail Panel ───────────────────────────────────────
var _activeTab = "overview";

function switchTab(name) {
  _activeTab = name;
  document.querySelectorAll(".tab-btn").forEach(function(b){ b.classList.toggle("active", b.dataset.tab===name); });
  document.querySelectorAll(".tab-pane").forEach(function(p){ p.classList.toggle("active", p.dataset.tab===name); });
}

function showDetail(id) {
  var nodes = (state.nodes || []);
  var n = null;
  for (var i=0; i<nodes.length; i++) { if(nodes[i].id===id){n=nodes[i];break;} }
  if (!n) return;

  var panel = document.getElementById("detailPanel");
  panel.className = "detail-panel";

  // Execution time
  var execTime = "—";
  if (n.created_at) {
    var start = new Date(n.created_at);
    var end = n.completed_at ? new Date(n.completed_at) : new Date();
    var diff = Math.round((end - start) / 1000);
    var mins = Math.floor(diff/60), secs = diff%60;
    execTime = (mins>0 ? mins+"m " : "") + secs + "s" + (n.completed_at ? "" : " (running)");
  }

  // Metrics
  var metricsHtml = "<em style='color:var(--muted)'>None</em>";
  if (n.metrics && Object.keys(n.metrics).length > 0) {
    metricsHtml = Object.entries(n.metrics).map(function(kv){
      return '<div><div class="label">'+kv[0]+'</div><div class="metric-val">'+
        (typeof kv[1]==="number" ? kv[1].toLocaleString() : kv[1])+'</div></div>';
    }).join("");
  }

  var parentHtml = n.parent_id
    ? '<span class="parent-chain">depth '+n.depth+' ← <span>'+n.parent_id.substring(0,16)+'…</span></span>'
    : '<span class="parent-chain">Root node</span>';

  var retryHtml = n.retry_count > 0
    ? '<div class="detail-row"><div class="label">Retries</div><div class="value">⚠️ '+n.retry_count+' time(s)</div></div>' : "";

  // ── TAB: Overview ──
  var overviewHtml =
    '<div class="detail-row"><div class="label">ID</div><div class="value" style="font-family:monospace;font-size:.8rem">'+escHtml(n.id)+'</div></div>'+
    '<div class="detail-row"><div class="label">Status</div><span class="badge '+n.status+'">'+n.status.toUpperCase()+'</span></div>'+
    '<div class="detail-row"><div class="label">Type</div><div class="value">'+(LABEL_EMOJI[n.label]||"")+" "+(n.label||"—")+'</div></div>'+
    '<div class="detail-row"><div class="label">Execution Time</div><div class="value">'+execTime+'</div></div>'+
    '<div class="detail-row"><div class="label">Parent</div><div class="value">'+parentHtml+'</div></div>'+
    retryHtml+
    '<div class="detail-row"><div class="label">Metrics</div><div class="value">'+metricsHtml+'</div></div>'+
    (n.eval_summary ? '<div class="detail-row"><div class="label">Evaluation Summary</div><div class="eval-box">'+escHtml(n.eval_summary)+'</div></div>' : '')+
    (n.error_log ? '<div class="detail-row"><div class="label">Error</div><div class="error-box">'+escHtml(n.error_log)+'</div></div>' : '');

  // ── TAB: Trace (tool call log + eval_summary) ──
  var traceLines = [];
  if (n.eval_summary) {
    traceLines.push("=== EVALUATION SUMMARY ===");
    traceLines.push(n.eval_summary);
    traceLines.push("");
  }
  if (n.trace_log && n.trace_log.length > 0) {
    traceLines.push("=== TOOL CALL TRACE ===");
    traceLines = traceLines.concat(n.trace_log);
  }
  var traceHtml;
  if (traceLines.length > 0) {
    traceHtml = '<div class="code-block" style="font-size:11px;line-height:1.6;white-space:pre-wrap;max-height:500px;overflow-y:auto">' +
      escHtml(traceLines.join("\n")) + '</div>';
  } else {
    traceHtml = '<div style="color:var(--muted);font-size:.8rem;padding:8px 0">No trace available.<br><small>Trace is captured live during BFTS runs. Checkpoint nodes show only eval_summary.</small></div>';
  }

  // ── TAB: Code ──
  var codeHtml = '<div style="color:var(--muted);font-size:.8rem;padding:8px 0">Loading code artifacts…</div>';

  // ── TAB: Output ──
  var outputHtml = '<div style="color:var(--muted);font-size:.8rem;padding:8px 0">Loading output…</div>';

  // Artifacts: code + stdout
  // Artifacts can be: {type, content/stdout} objects OR file path strings
  if (n.artifacts && n.artifacts.length > 0) {
    var codes = [], outputs = [];
    n.artifacts.forEach(function(a){
      if (typeof a === "string") {
        // File path artifact — fetch content via /codefile endpoint
        var loadingId = "ari-loading-" + Math.random().toString(36).slice(2);
        codes.push('<span id="'+loadingId+'">⏳ Loading: ' + a.split("/").pop() + '</span>');
        // Async fetch and set content
        (function(path, lid) {
          fetch("/codefile?path=" + encodeURIComponent(path))
            .then(function(r){ return r.text(); })
            .then(function(txt){
              var el = document.getElementById(lid);
              if (el) {
                var pre = document.createElement("pre");
                pre.style.whiteSpace = "pre-wrap";
                pre.style.fontSize = "11px";
                pre.style.fontFamily = "monospace";
                pre.style.color = "#e2e8f0";
                pre.style.margin = "4px 0";
                pre.textContent = txt;
                el.parentNode.replaceChild(pre, el);
              }
            }).catch(function(){ 
              var el = document.getElementById(lid);
              if (el) el.textContent = "❌ Could not load: " + path;
            });
        })(a, loadingId);
      } else if (typeof a === "object") {
        if (a.type === "code" || a.language) codes.push(a.content || a.stdout || JSON.stringify(a));
        else if (a.type === "result" || a.stdout) outputs.push(a.stdout || JSON.stringify(a));
        else codes.push(JSON.stringify(a, null, 2));
      } else {
        outputs.push(String(a));
      }
    });
    if (codes.length > 0) codeHtml = codes.map(function(c){ return '<div class="code-block">'+c+'</div>'; }).join('<br>');  // no escHtml: may contain HTML (spans for async loading)
    else codeHtml = '<div style="color:var(--muted);font-size:.8rem;padding:8px 0">No code artifacts.</div>';
    if (outputs.length > 0) outputHtml = outputs.map(function(o){ return '<div class="stdout-block">'+escHtml(o)+'</div>'; }).join('<br>');
    else outputHtml = '<div style="color:var(--muted);font-size:.8rem;padding:8px 0">No output artifacts.</div>';
  }

  panel.innerHTML =
    '<div class="detail">'+
    '<h2>Node Detail</h2>'+
    '<div class="tabs">'+
    '<button class="tab-btn active" data-tab="overview" onclick="switchTab(this.dataset.tab)">Overview</button>'+
    '<button class="tab-btn" data-tab="trace" onclick="switchTab(this.dataset.tab)">Trace</button>'+
    '<button class="tab-btn" data-tab="code" onclick="switchTab(this.dataset.tab)">Code</button>'+
    '<button class="tab-btn" data-tab="output" onclick="switchTab(this.dataset.tab)">Output</button>'+
    '</div>'+
    '<div class="tab-pane active" data-tab="overview">'+overviewHtml+'</div>'+
    '<div class="tab-pane" data-tab="trace" id="tab-trace-'+id+'">'+traceHtml+'</div>'+
    '<div class="tab-pane" data-tab="code" id="tab-code-'+id+'">'+codeHtml+'</div>'+
    '<div class="tab-pane" data-tab="output" id="tab-output-'+id+'">'+outputHtml+'</div>'+
    '</div>';

  _activeTab = "overview";

  // Async load trace from /memory/<node_id>
  fetch("/memory/"+encodeURIComponent(id))
    .then(function(r){ return r.json(); })
    .then(function(d){
      var el = document.getElementById("tab-trace-"+id);
      if (!el) return;
      var entries = d.entries || [];
      if (entries.length === 0) {
        // Don't overwrite if we already have eval_summary or trace_log content
        if (el.textContent.trim() && !el.textContent.includes("No trace available")) return;
        el.innerHTML = '<div style="color:var(--muted);font-size:.8rem;padding:8px 0">No memory entries found.</div>';
        return;
      }
      var html = entries.map(function(e){
        var tool = (e.metadata && e.metadata.tool) ? e.metadata.tool : "—";
        var step = (e.metadata && e.metadata.step !== undefined) ? "step "+e.metadata.step : "";
        // Parse tool name and result from text like "Tool survey: {...}"
        var text = e.text || "";
        var toolMatch = text.match(/^Tool ([\w_]+): (.*)$/s);
        var toolName = toolMatch ? toolMatch[1] : tool;
        var resultStr = toolMatch ? toolMatch[2] : text;
        // Try to pretty-print JSON result
        var prettyResult = resultStr;
        try {
          var parsed = JSON.parse(resultStr);
          if (parsed && parsed.result) {
            try { parsed = JSON.parse(parsed.result); } catch(e2){}
          }
          prettyResult = JSON.stringify(parsed, null, 2);
          if (prettyResult.length > 400) prettyResult = prettyResult.substring(0,400)+"…";
        } catch(ex) {
          if (prettyResult.length > 300) prettyResult = prettyResult.substring(0,300)+"…";
        }
        return '<div class="trace-entry">'+
          '<span class="trace-icon">'+escHtml(toolName)+'</span>'+
          '<div class="trace-text">'+
          (step ? '<span style="color:var(--accent);margin-right:6px">'+step+'</span>' : '')+
          '<pre style="margin:0;white-space:pre-wrap;font-family:monospace;font-size:.7rem;color:var(--muted)">'+escHtml(prettyResult)+'</pre>'+
          '</div></div>';
      }).join("");
      el.innerHTML = '<div style="font-size:.75rem;color:var(--muted);margin-bottom:8px">'+entries.length+' tool calls</div>'+html;
    })
    .catch(function(){ 
      var el = document.getElementById("tab-trace-"+id);
      if (el) el.innerHTML = '<div style="color:var(--muted);font-size:.8rem">Trace unavailable.</div>';
    });
}

function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ── Status Bar ─────────────────────────────────────────
function updateStatusBar() {
  var nodes = state.nodes || [];
  var counts = {success:0, failed:0, running:0, pending:0};
  var bestVal = null, bestKey = null;
  nodes.forEach(function(n){
    if (counts[n.status] !== undefined) counts[n.status]++;
    if (n.status === "success" && n.metrics) {
      Object.entries(n.metrics).forEach(function(kv){
        // Skip SLURM job IDs and non-scientific keys
        var skip = /slurm|job_id|job_num|^N$|^threads$|^result_\d+$|^n_|^num_|execution_time|_ms/i.test(kv[0]);
        // For error/diff metrics: lower = better
        var isErrMetric = /error|diff|loss/i.test(kv[0]);
        if (!skip && isErrMetric && typeof kv[1] === "number" && (bestVal === null || kv[1] < bestVal)) {
          bestVal = kv[1]; bestKey = kv[0];
        } else if (!skip && !isErrMetric && typeof kv[1] === "number" && bestVal === null) {
          bestVal = kv[1]; bestKey = kv[0];
        }
        if (!skip && typeof kv[1] === "number" && (bestVal === null || kv[1] > bestVal)) {
          bestVal = kv[1]; bestKey = kv[0];
        }
      });
    }
  });
  document.getElementById("sb-total").textContent = nodes.length;
  document.getElementById("sb-ok").textContent = counts.success;
  document.getElementById("sb-fail").textContent = counts.failed;
  document.getElementById("sb-run").textContent = counts.running;
  document.getElementById("sb-pend").textContent = counts.pending;
  var bestDisp = "";
  if (bestVal !== null) {
    var dispVal = Math.abs(bestVal) < 0.001 ? bestVal.toExponential(3) : bestVal.toLocaleString(undefined, {maximumFractionDigits:6});
    bestDisp = "Best " + bestKey + ": " + dispVal;
  }
  document.getElementById("sb-best").textContent = bestDisp;
}
</script>
