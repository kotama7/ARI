[pytest]
# importlib import mode lets test modules across the repo share basenames
# (multiple test_server.py / test_memory.py) without colliding on the
# default "prepend" sys.path packaging.
addopts = --import-mode=importlib

# Default testpath: ari-core/tests is the in-process safe set.
#
# Each ari-skill-* package ships its own ``src/server.py``. Importing
# ``from src.server import …`` (or ``from server import …``) across two
# skills in the same Python process is fundamentally ambiguous —
# ``sys.modules`` caches the first skill's module and downstream
# ``unittest.mock.patch("src.server.X")`` calls then target the wrong
# module.
#
# **Full suite**: run ``bash scripts/run_all_tests.sh`` to execute each
# skill in its own pytest process. Each skill's tests can also be run
# standalone via ``pytest ari-skill-<name>/tests`` from the repo root.
testpaths =
    ari-core/tests
asyncio_mode = auto
