# Dependabot configuration (schema v2) for the ARI monorepo.
#
# Scope: automated dependency-update PRs for the three real dependency
# ecosystems in this repository (github-actions, pip, npm). Introduced by
# refactoring subtask 052
# (docs/refactoring/subtasks/052_add_dependabot_and_actions_policy.md). This
# file is inert in a local checkout; it only drives GitHub's hosted Dependabot
# service. The written policy (version-pinning strategy, grouping/cadence,
# least-privilege permissions, review convention) lives in CONTRIBUTING.md
# under "GitHub Actions & Dependencies" and is cross-referenced from SECURITY.md.
#
# Deliberate exclusions (verified 2026-07-01 against the working tree):
#   * gitsubmodule ecosystem is NOT tracked. ari-skill-idea/vendor/virsci
#     (a Virtual-Scientists fork) and ari-skill-paper-re/vendor/paperbench
#     (openai/preparedness) are pinned external forks; auto-bumping their
#     submodule SHAs is undesirable.
#   * pip "/ari-skill-orchestrator" is NOT listed. That one skill ships no
#     pyproject.toml (13 of 14 skills have one); pointing Dependabot at a
#     missing manifest would error. Only first-party directories are listed,
#     so the vendored pyproject.toml files under the two vendor/ submodule
#     trees above are also excluded.
#   * docker ecosystem is NOT added. There are no in-tree Dockerfiles outside
#     vendor/ (containers/ holds only a README).
#
# Note: requirements.lock is a resolved lockfile, not a Dependabot-managed
# requirements.txt-format file. Dependabot updates requirements.txt and
# pyproject.toml, so requirements.lock may drift and must be regenerated by
# hand when a pip bump PR is merged (see the CONTRIBUTING.md policy note).
version: 2
updates:
  # --- GitHub Actions -------------------------------------------------------
  # The six first-party actions/* are pinned at major tags today; Dependabot
  # owns the bumps. Group them so the bumps land in one PR instead of six.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "github-actions"

  # --- Python (pip) ---------------------------------------------------------
  # One block covering the 15 verified first-party manifest directories:
  # the root requirements.txt, ari-core, and the 13 skills that ship a
  # pyproject.toml. ari-skill-orchestrator is intentionally absent (no
  # manifest). Minor/patch bumps are grouped per directory to cap PR volume
  # across the tree; a low open-PR limit adds a second guardrail.
  - package-ecosystem: "pip"
    directories:
      - "/"
      - "/ari-core"
      - "/ari-skill-benchmark"
      - "/ari-skill-coding"
      - "/ari-skill-evaluator"
      - "/ari-skill-hpc"
      - "/ari-skill-idea"
      - "/ari-skill-memory"
      - "/ari-skill-paper"
      - "/ari-skill-paper-re"
      - "/ari-skill-plot"
      - "/ari-skill-replicate"
      - "/ari-skill-transform"
      - "/ari-skill-vlm"
      - "/ari-skill-web"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
      - "python"

  # --- JavaScript (npm) -----------------------------------------------------
  # Exactly two committed npm trees. node_modules/ is gitignored/untracked and
  # irrelevant (Dependabot reads package.json / package-lock.json).
  - package-ecosystem: "npm"
    directory: "/docs"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
      - "javascript"

  - package-ecosystem: "npm"
    directory: "/ari-core/ari/viz/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
      - "javascript"
