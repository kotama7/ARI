# Phase DR4 / DEPRECATION_REMOVAL.md §8-2 — Refactor guard rails.
#
# Two guards live here:
# 1. **No new ``~/.ari/`` references** — diff against ``main`` and fail
#    on additions outside the ``migrations/`` package.
# 2. **No accidental writes to ``$HOME/.ari/`` during pytest** — run the
#    test suite under a redirected HOME and assert the directory stays
#    empty.

name: refactor-guards

on:
  pull_request:
    branches:
      - main
      - refactoring

jobs:
  no-home-ari-writes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Runtime deps (mcp, letta-client, websockets, ...) live in
          # the repo-root requirements.txt; ari-core/pyproject.toml
          # intentionally excludes them so non-PyPI skill imports
          # (ari_skill_memory) do not trip pip's index resolver.
          pip install -r requirements.txt
          # Editable installs in dependency order: skill-memory first
          # (ari-core imports it directly), then core itself.
          pip install -e ari-skill-memory
          pip install -e ari-core
          # ari-core tests transitively import a few skill modules via
          # `sys.path.insert(...)` (e.g. test_event_loop_and_csv reaches
          # into ari-skill-benchmark/src/server.py).  Pull their PyPI
          # deps without installing the skill packages — keeps the job
          # fast and avoids paper-re's git+chz vendor pull.
          pip install scipy numpy pandas
          pip install pytest pytest-asyncio pytest-mock respx
      - name: Run tests under a redirected HOME
        run: |
          export HOME="$RUNNER_TEMP/fake_home"
          mkdir -p "$HOME"
          # test_dashboard_html.py asserts the Vite production bundle
          # exists at ari-core/ari/viz/static/dist/.  That artefact is
          # produced by a separate frontend build job; this guard only
          # cares about ~/.ari/ writes, not frontend bundling.
          pytest ari-core/tests/ -q \
            --ignore=ari-core/tests/test_letta_restart_live.py \
            --ignore=ari-core/tests/test_letta_start_scripts.py \
            --ignore=ari-core/tests/test_ollama_gpu.py \
            --ignore=ari-core/tests/test_dashboard_html.py
          if [ -d "$HOME/.ari" ]; then
            echo "::error::Tests created $HOME/.ari/ — see docs/_archive/refactor_audit.md"
            ls -la "$HOME/.ari" || true
            exit 1
          fi

  no-new-home-ari-refs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect new ~/.ari references in core
        run: |
          # Compare against the merge base. The path-based excludes
          # below are the legitimate ~/.ari/ touch points: the central
          # deprecation helper, every back-compat shim that emits a
          # DeprecationWarning before falling through to PathManager,
          # the migrations package, and a handful of files whose
          # ~/.ari/ references are only docstrings/comments
          # explaining the deprecation.
          base="$(git merge-base origin/${{ github.base_ref || 'main' }} HEAD)"
          ADDED=$(git diff "$base" HEAD -- 'ari-core/ari/**.py' \
            ':!ari-core/ari/_deprecation.py' \
            ':!ari-core/ari/migrations/' \
            ':!ari-core/ari/core.py' \
            ':!ari-core/ari/paths.py' \
            ':!ari-core/ari/memory_cli.py' \
            ':!ari-core/ari/memory/auto_migrate.py' \
            ':!ari-core/ari/memory/file_client.py' \
            ':!ari-core/ari/publish/backends/ari_registry.py' \
            ':!ari-core/ari/clone/resolvers/ari.py' \
            ':!ari-core/ari/registry/__init__.py' \
            ':!ari-core/ari/viz/state.py' \
            ':!ari-core/ari/viz/api_settings.py' \
            ':!ari-core/ari/viz/api_publish.py' \
            | grep -vE '^\+\+\+ ' \
            | grep -E '^\+.*(Path\.home\(\).*\.ari|~/\.ari)' \
            | grep -vE '^\+\s*#' \
            || true)
          if [ -n "$ADDED" ]; then
            echo "::error::New ~/.ari/ references introduced outside the allowed deprecation/shim sites. To allow a new site, add it to the path-exclude list in this workflow with a justification."
            echo "$ADDED"
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Refactor-invariant / boundary gates appended by subtask 049
  # (add_contract_check_workflows). Authoritative wiring spec:
  # docs/refactoring/reports/032_quality_script_ci_integration.md §3-§7;
  # layout in docs/refactoring/012_github_workflow_integration_plan.md §7.3/§15.
  #
  # These land here (not in a new workflow) because refactor-guards.yml is the
  # ONLY workflow also triggered on the `refactoring` branch, so refactoring
  # branches get these gates before reaching `main`. The two jobs above
  # (no-home-ari-writes, no-new-home-ari-refs) are unchanged.
  #
  # Every gate LANDS AT STAGE 1 (advisory): each checker runs `--warning-only`
  # and carries `continue-on-error: true`, so a finding can never turn a green
  # PR red. Promotion to hard (Stage 2/4) is a later one-line flip
  # (`continue-on-error: false` or `--fail-on-regression`/`--check`), never a
  # workflow rewrite. Determinism (P2): stdlib+PyYAML(+ruff) only, no LLM/network.
  # ---------------------------------------------------------------------------

  import-boundaries:
    # subtask 026 — ari.public.* boundary + core<->skill direction (itself a
    # contract). Repo-wide scan against a frozen allowlist. Stage 1 (advisory) -> 2.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install PyYAML
        run: python -m pip install --upgrade pip pyyaml
      - name: Import-boundary check (advisory at Stage 1)
        continue-on-error: true
        run: |
          python scripts/check_import_boundaries.py \
            --warning-only --format json --output check_import_boundaries.json
      - name: Upload import-boundaries report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-import-boundaries
          path: check_import_boundaries.json
          if-no-files-found: warn

  directory-policy:
    # subtask 028 — placement/naming policy over the real config trio
    # (ari-core/ari/config vs ari-core/ari/configs vs ari-core/config; no
    # `sonfigs/` exists anywhere). Cheap repo-wide tree scan. Stage 1 -> 4.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install PyYAML
        run: python -m pip install --upgrade pip pyyaml
      - name: Directory-policy check (advisory at Stage 1)
        continue-on-error: true
        run: |
          python scripts/check_directory_policy.py \
            --warning-only --format json --output check_directory_policy.json
      - name: Upload directory-policy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-directory-policy
          path: check_directory_policy.json
          if-no-files-found: warn

  complexity:
    # subtask 025 — LOC / cyclomatic (ruff McCabe C901) budget, diff-scoped vs the
    # PR base. Stage 1 (advisory) -> 4.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install PyYAML + ruff
        # ruff (McCabe C901) backs the complexity engine; pin to the frozen 0.15.2 baseline.
        run: python -m pip install --upgrade pip pyyaml ruff==0.15.2
      - name: Complexity / LOC budget (advisory at Stage 1)
        continue-on-error: true
        # base.sha is the PR base tip on the event payload: immutable for this run
        # and always reachable in the fetched history. Preferred over the
        # `origin/<base_ref>` idiom in the no-new-home-ari-refs job above (which
        # resolves a remote-tracking ref that can move mid-run) — rationale in
        # docs-change-coupling.yml:42-47. That older idiom is "not preferred",
        # not "deprecated"; new diff-scoped jobs must not copy it.
        run: |
          python scripts/check_complexity.py \
            --warning-only \
            --format json --output check_complexity.json \
            --base-ref "${{ github.event.pull_request.base.sha }}"
      - name: Upload complexity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-complexity
          path: check_complexity.json
          if-no-files-found: warn

  lint:
    # ruff lint — advisory-only surface (frozen baseline: 661 findings, 341 F401).
    # Stays advisory; it is the ratchet reference, never a hard gate here. Stage 1.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install ruff
        run: python -m pip install --upgrade pip ruff==0.15.2
      - name: ruff check ari-core (advisory)
        continue-on-error: true
        run: ruff check ari-core

  dead-code:
    # subtask 055 — dead-code candidate classifier over the reference graph.
    # Regenerate the graph fresh from the PR tree (054), then classify (055),
    # corroborated by ruff F401. Stage 1 (advisory) -> 4.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install PyYAML + ruff
        run: python -m pip install --upgrade pip pyyaml ruff==0.15.2
      - name: Build reference graph (advisory)
        continue-on-error: true
        run: python scripts/analyze_references.py --output reference_graph.json
      - name: Dead-code candidates (advisory at Stage 1)
        continue-on-error: true
        run: |
          python scripts/check_dead_code.py \
            --graph reference_graph.json \
            --warning-only \
            --format json --output check_dead_code.json
      - name: Upload dead-code report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-dead-code
          path: check_dead_code.json
          if-no-files-found: warn
